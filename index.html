<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>富邦 VCCT 月配息計算器</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #f5f5f7; color: #1d1d1f; min-height: 100vh; padding: 2rem 1rem; }
  .container { max-width: 720px; margin: 0 auto; }
  h1 { font-size: 1.6rem; font-weight: 600; margin-bottom: 4px; }
  .subtitle { font-size: 14px; color: #6e6e73; margin-bottom: 2rem; }
  .card { background: #fff; border-radius: 16px; padding: 1.5rem; margin-bottom: 1.25rem; box-shadow: 0 1px 4px rgba(0,0,0,0.08); }
  .card h2 { font-size: 13px; font-weight: 600; color: #6e6e73; text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 1rem; }
  .grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .field { display: flex; flex-direction: column; gap: 5px; }
  .field label { font-size: 13px; color: #6e6e73; }
  .field input, .field select { font-size: 15px; padding: 9px 11px; border-radius: 10px; border: 1px solid #d2d2d7; background: #f5f5f7; color: #1d1d1f; width: 100%; }
  .field input:focus, .field select:focus { outline: none; border-color: #0071e3; background: #fff; }
  .field .hint { font-size: 11px; color: #aeaeb2; }
  .fee-info { font-size: 12px; color: #0071e3; background: #f0f6ff; border-radius: 8px; padding: 6px 10px; margin-top: 6px; }
  .fund-block { border: 1px solid #e5e5ea; border-radius: 12px; padding: 1rem; margin-bottom: 10px; position: relative; }
  .fund-block .fund-title { font-size: 13px; font-weight: 600; color: #0071e3; margin-bottom: 10px; }
  .remove-btn { position: absolute; top: 10px; right: 10px; background: none; border: none; color: #aeaeb2; font-size: 18px; cursor: pointer; }
  .remove-btn:hover { color: #ff3b30; }
  .ratio-row { display: flex; align-items: center; gap: 8px; margin-top: 10px; }
  .ratio-row label { font-size: 13px; color: #6e6e73; white-space: nowrap; }
  .ratio-row input { width: 90px; font-size: 15px; padding: 7px 10px; border-radius: 10px; border: 1px solid #d2d2d7; background: #f5f5f7; color: #1d1d1f; }
  .ratio-row input:focus { outline: none; border-color: #0071e3; background: #fff; }
  .ratio-total { font-size: 13px; padding: 6px 12px; border-radius: 8px; margin-top: 8px; display: none; }
  .ratio-total.ok  { background: #edfaf1; color: #1a8a3c; display: block; }
  .ratio-total.err { background: #fef0f0; color: #c0392b; display: block; }
  .add-btn { width: 100%; padding: 10px; border-radius: 10px; border: 1.5px dashed #d2d2d7; background: none; color: #0071e3; font-size: 14px; cursor: pointer; margin-top: 4px; }
  .add-btn:hover { background: #f0f6ff; }
  .calc-btn { width: 100%; padding: 13px; border-radius: 12px; border: none; background: #0071e3; color: #fff; font-size: 16px; font-weight: 500; cursor: pointer; margin-top: 4px; }
  .calc-btn:hover { background: #0077ed; }
  .results { display: none; }
  .results.show { display: block; }
  .metric-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin-bottom: 1rem; }
  .metric { background: #f0f6ff; border-radius: 12px; padding: 14px 12px; }
  .metric .m-label { font-size: 12px; color: #0071e3; margin-bottom: 5px; }
  .metric .m-val { font-size: 20px; font-weight: 600; color: #0071e3; }
  table { width: 100%; border-collapse: collapse; font-size: 14px; }
  th { text-align: left; padding: 8px 10px; font-size: 12px; color: #6e6e73; font-weight: 500; border-bottom: 1px solid #e5e5ea; }
  td { padding: 10px; border-bottom: 1px solid #f2f2f7; }
  tr:last-child td { border-bottom: none; }
  .best-banner { background: linear-gradient(135deg, #ffd60a, #ff9f0a); border-radius: 12px; padding: 14px 18px; color: #3a2500; margin-top: 1rem; }
  .best-banner .bl { font-size: 13px; font-weight: 500; margin-bottom: 3px; }
  .best-banner .bv { font-size: 20px; font-weight: 700; }
  .warn { background: #fff3cd; border-radius: 10px; padding: 10px 14px; font-size: 13px; color: #856404; margin-top: 8px; display: none; }
  .medal { font-size: 16px; }
  @media (max-width: 500px) { .grid2, .metric-grid { grid-template-columns: 1fr 1fr; } }
</style>
</head>
<body>
<div class="container">
  <h1>富邦 VCCT 月配息計算器</h1>
  <p class="subtitle">富邦人壽真豐利變額年金保險｜多檔基金比較版</p>

  <!-- 基本設定 -->
  <div class="card">
    <h2>基本設定</h2>
    <div class="grid2">
      <div class="field">
        <label>保費（台幣）</label>
        <input type="number" id="premium" value="1000000" oninput="updateFeeRate()">
        <div class="fee-info" id="fee-info">手續費 5%｜實際投入 TWD 950,000</div>
      </div>
      <div class="field">
        <label>美金匯率</label>
        <input type="number" id="usdRate" value="31.4" step="0.1">
      </div>
    </div>
  </div>

  <!-- 手續費說明 -->
  <div class="card" style="padding:1rem 1.5rem;">
    <h2>手續費級距</h2>
    <table style="font-size:13px;">
      <tr><th>保費金額</th><th>手續費率</th></tr>
      <tr><td>未滿 200 萬</td><td>5%</td></tr>
      <tr><td>200 萬～499 萬</td><td>4%</td></tr>
      <tr><td>500 萬～999 萬</td><td>3%</td></tr>
      <tr><td>1,000 萬以上</td><td>2%</td></tr>
    </table>
  </div>

  <!-- 基金輸入 -->
  <div class="card">
    <h2>基金資料</h2>
    <div id="ratio-total" class="ratio-total"></div>
    <div id="funds-container"></div>
    <button class="add-btn" onclick="addFund()">＋ 新增基金</button>
    <div class="warn" id="warn"></div>
  </div>

  <button class="calc-btn" onclick="calculate()">計算並比較</button>

  <!-- 結果 -->
  <div class="results card" id="results" style="margin-top:1.25rem;">
    <h2>計算結果</h2>
    <div class="metric-grid" id="top-metrics"></div>
    <table>
      <thead>
        <tr>
          <th>排名</th><th>基金</th><th>配置</th><th>淨值</th><th>分配</th><th>月配息(TWD)</th><th>報酬率</th>
        </tr>
      </thead>
      <tbody id="result-table"></tbody>
    </table>
    <div id="summary-row" style="margin-top:10px; font-size:14px; padding:10px; background:#f5f5f7; border-radius:10px;"></div>
    <div class="best-banner" id="best-banner"></div>
  </div>
</div>

<script>
const PRESET_FUNDS = [
  { name: "JFP11", label: "JFP11｜摩根多重收益(美元對沖)",  nav: 74.7300, dist: 0.6930 },
  { name: "ACC3",  label: "ACC3｜安聯收益成長基金",          nav:  9.4100, dist: 0.0750 },
  { name: "IGB5",  label: "IGB5｜景順環球高評級企業債券",    nav:  6.9938, dist: 0.0510 },
  { name: "FRP4",  label: "FRP4｜富蘭克林穩定月收益",        nav:  9.8300, dist: 0.0670 },
  { name: "DSP5",  label: "DSP5｜安聯收益成長(美元)",        nav:  8.7391, dist: 0.0550 },
  { name: "SCP6",  label: "SCP6｜施羅德環球收益成長",        nav: 141.7219, dist: 1.1841 },
  { name: "ESC1",  label: "ESC1｜摩根多元入息成長",          nav:  8.3700, dist: 0.0687 },
  { name: "MLE24", label: "MLE24｜貝萊德世界科技基金",       nav: 20.9900, dist: 0.1375 },
];

let fundCount = 0;

function getFeeRate(premium) {
  if (premium >= 10000000) return 0.02;
  if (premium >= 5000000)  return 0.03;
  if (premium >= 2000001)  return 0.04;
  return 0.05;
}

function updateFeeRate() {
  const premium  = parseFloat(document.getElementById('premium').value) || 0;
  const rate     = getFeeRate(premium);
  const feeCost  = premium * rate;
  const effective = premium - feeCost;
  const rateText = (rate * 100).toFixed(0);
  document.getElementById('fee-info').textContent =
    `手續費 ${rateText}%｜費用 TWD ${fmt(feeCost)}｜實際投入 TWD ${fmt(effective)}`;
}

function buildOptions() {
  let opts = '<option value="">── 請選擇基金 ──</option>';
  PRESET_FUNDS.forEach((f, i) => {
    opts += `<option value="${i}">${f.label}</option>`;
  });
  opts += '<option value="custom">── 自訂輸入 ──</option>';
  return opts;
}

function addFund() {
  fundCount++;
  const div = document.createElement('div');
  div.className = 'fund-block';
  div.id = `fund-${fundCount}`;
  div.innerHTML = `
    <div class="fund-title">第 ${fundCount} 檔基金</div>
    <button class="remove-btn" onclick="removeFund(${fundCount}); updateRatioTotal()">✕</button>

    <div class="field" style="margin-bottom:10px;">
      <label>選擇基金</label>
      <select id="sel-${fundCount}" onchange="onPresetChange(${fundCount})">
        ${buildOptions()}
      </select>
    </div>

    <div id="custom-fields-${fundCount}" style="display:none;">
      <div class="grid2" style="margin-bottom:8px;">
        <div class="field">
          <label>基金名稱</label>
          <input type="text" id="name-${fundCount}" placeholder="例：JFP11">
        </div>
        <div class="field">
          <label>基金單位淨值（美金）</label>
          <input type="number" id="nav-${fundCount}" placeholder="例：74.73" step="0.0001">
        </div>
      </div>
      <div class="field" style="margin-bottom:8px;">
        <label>每單位分配金額（美金）</label>
        <input type="number" id="dist-${fundCount}" placeholder="例：0.693" step="0.0001">
      </div>
    </div>

    <div class="ratio-row">
      <label>配置比例</label>
      <input type="number" id="ratio-${fundCount}" value="0" min="0" max="100" step="1" oninput="updateRatioTotal()">
      <span style="font-size:14px; color:#6e6e73;">%</span>
    </div>
  `;
  document.getElementById('funds-container').appendChild(div);
  updateRatioTotal();
}

function onPresetChange(id) {
  const sel = document.getElementById(`sel-${id}`);
  const val = sel.value;
  const customFields = document.getElementById(`custom-fields-${id}`);
  if (val === 'custom') {
    customFields.style.display = 'block';
  } else if (val !== '') {
    customFields.style.display = 'none';
  } else {
    customFields.style.display = 'none';
  }
}

function removeFund(id) {
  const el = document.getElementById(`fund-${id}`);
  if (el) el.remove();
  updateRatioTotal();
}

function updateRatioTotal() {
  const inputs = document.querySelectorAll('[id^="ratio-"]');
  let total = 0;
  inputs.forEach(inp => { total += parseFloat(inp.value) || 0; });
  const el = document.getElementById('ratio-total');
  if (inputs.length === 0) { el.className = 'ratio-total'; return; }
  if (total === 100) {
    el.className = 'ratio-total ok';
    el.textContent = `✅ 配置比例總和：${total}%（正確）`;
  } else {
    el.className = 'ratio-total err';
    el.textContent = `⚠️ 配置比例總和：${total}%（需等於 100%）`;
  }
}

function getFundData(id) {
  const sel  = document.getElementById(`sel-${id}`);
  const val  = sel ? sel.value : '';
  const ratio = parseFloat(document.getElementById(`ratio-${id}`).value) || 0;

  if (val === 'custom' || val === '') {
    const name = (document.getElementById(`name-${id}`) || {}).value || `基金${id}`;
    const nav  = parseFloat((document.getElementById(`nav-${id}`) || {}).value);
    const dist = parseFloat((document.getElementById(`dist-${id}`) || {}).value);
    return { name, nav, dist, ratio };
  } else {
    const f = PRESET_FUNDS[parseInt(val)];
    return { name: f.name, nav: f.nav, dist: f.dist, ratio };
  }
}

function fmt(n, dec=0) {
  return n.toLocaleString('zh-TW', {minimumFractionDigits: dec, maximumFractionDigits: dec});
}

function calculate() {
  const premium  = parseFloat(document.getElementById('premium').value) || 0;
  const feeRate  = getFeeRate(premium);
  const usdRate  = parseFloat(document.getElementById('usdRate').value) || 0;
  const warn     = document.getElementById('warn');
  const blocks   = document.querySelectorAll('.fund-block');

  if (blocks.length === 0) {
    warn.style.display = 'block';
    warn.textContent = '請先新增至少一檔基金。';
    return;
  }

  // 驗證配置比例
  let totalRatio = 0;
  blocks.forEach(b => {
    const id = b.id.split('-')[1];
    totalRatio += parseFloat(document.getElementById(`ratio-${id}`).value) || 0;
  });
  if (Math.abs(totalRatio - 100) > 0.01) {
    warn.style.display = 'block';
    warn.textContent = `配置比例總和為 ${totalRatio}%，必須等於 100% 才能計算。`;
    return;
  }
  warn.style.display = 'none';

  const feeCost       = premium * feeRate;
  const effectiveTotal = premium - feeCost;
  const results = [];

  for (const block of blocks) {
    const id = block.id.split('-')[1];
    const { name, nav, dist, ratio } = getFundData(id);

    if (!nav || !dist) {
      warn.style.display = 'block';
      warn.textContent = `「${name}」的淨值或分配金額未填寫，請檢查。`;
      return;
    }
    if (!ratio) {
      warn.style.display = 'block';
      warn.textContent = `「${name}」的配置比例為 0，請填寫。`;
      return;
    }

    const allocated  = effectiveTotal * (ratio / 100);
    const usdIn      = allocated / usdRate;
    const units      = usdIn / nav;
    const monthlyUsd = units * dist;
    const monthlyTwd = monthlyUsd * usdRate;
    const yearlyTwd  = monthlyTwd * 12;
    const yieldRate  = (yearlyTwd / allocated) * 100;

    results.push({ name, nav, dist, ratio, allocated, monthlyTwd, yearlyTwd, yieldRate });
  }

  results.sort((a, b) => b.yieldRate - a.yieldRate);
  const medals = ['🥇', '🥈', '🥉'];
  const tbody  = document.getElementById('result-table');
  tbody.innerHTML = '';

  let totalMonthly = 0;
  let totalYearly  = 0;
  results.forEach((r, i) => {
    totalMonthly += r.monthlyTwd;
    totalYearly  += r.yearlyTwd;
    const tr = document.createElement('tr');
    tr.innerHTML = `
      <td>${medals[i] || (i+1)+'.'}  </td>
      <td>${r.name}</td>
      <td>${r.ratio}%</td>
      <td>${fmt(r.nav, 4)}</td>
      <td>${fmt(r.dist, 4)}</td>
      <td><strong>TWD ${fmt(Math.round(r.monthlyTwd))}</strong></td>
      <td><strong>${r.yieldRate.toFixed(2)}%</strong></td>
    `;
    tbody.appendChild(tr);
  });

  // 合計列
  const totalYield = (totalYearly / effectiveTotal) * 100;
  const sumTr = document.createElement('tr');
  sumTr.style.cssText = 'background:#f0f6ff; font-weight:600;';
  sumTr.innerHTML = `
    <td colspan="2">合計</td>
    <td>100%</td>
    <td colspan="2"></td>
    <td>TWD ${fmt(Math.round(totalMonthly))}</td>
    <td>${totalYield.toFixed(2)}%</td>
  `;
  tbody.appendChild(sumTr);

  document.getElementById('top-metrics').innerHTML = `
    <div class="metric">
      <div class="m-label">💰 手續費率</div>
      <div class="m-val">${(feeRate*100).toFixed(0)}%</div>
    </div>
    <div class="metric">
      <div class="m-label">📅 每月總配息</div>
      <div class="m-val">TWD ${fmt(Math.round(totalMonthly))}</div>
    </div>
    <div class="metric">
      <div class="m-label">📈 綜合年化報酬率</div>
      <div class="m-val">${totalYield.toFixed(2)}%</div>
    </div>
  `;

  document.getElementById('summary-row').innerHTML =
    `實際投入 TWD ${fmt(Math.round(effectiveTotal))}（保費 TWD ${fmt(premium)} 扣除手續費 TWD ${fmt(Math.round(feeCost))}）｜每年配息 TWD ${fmt(Math.round(totalYearly))}`;

  const best = results[0];
  document.getElementById('best-banner').innerHTML = `
    <div class="bl">🏆 最高報酬率基金</div>
    <div class="bv">${best.name}（配置 ${best.ratio}%）</div>
    <div style="margin-top:4px; font-size:14px;">月配息 TWD ${fmt(Math.round(best.monthlyTwd))}　年化報酬率 ${best.yieldRate.toFixed(2)}%</div>
  `;

  document.getElementById('results').classList.add('show');
  document.getElementById('results').scrollIntoView({ behavior: 'smooth' });
}

// 預設載入 2 檔空白基金
addFund();
addFund();
updateFeeRate();
</script>
</body>
</html>
