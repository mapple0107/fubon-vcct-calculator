<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>富邦 VCCT 月配息計算器</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #f5f5f7; color: #1d1d1f; min-height: 100vh; padding: 2rem 1rem; }
  .container { max-width: 720px; margin: 0 auto; }
  h1 { font-size: 1.6rem; font-weight: 600; margin-bottom: 4px; }
  .subtitle { font-size: 14px; color: #6e6e73; margin-bottom: 2rem; }
  .card { background: #fff; border-radius: 16px; padding: 1.5rem; margin-bottom: 1.25rem; box-shadow: 0 1px 4px rgba(0,0,0,0.08); }
  .card h2 { font-size: 13px; font-weight: 600; color: #6e6e73; text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 1rem; }
  .grid3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; }
  .grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .field { display: flex; flex-direction: column; gap: 5px; }
  .field label { font-size: 13px; color: #6e6e73; }
  .field input, .field select {
    font-size: 15px; padding: 9px 11px; border-radius: 10px;
    border: 1px solid #d2d2d7; background: #f5f5f7; color: #1d1d1f; width: 100%;
  }
  .field input:focus, .field select:focus { outline: none; border-color: #0071e3; background: #fff; }
  .field .hint { font-size: 11px; color: #aeaeb2; }
  .fund-block { border: 1px solid #e5e5ea; border-radius: 12px; padding: 1rem; margin-bottom: 10px; position: relative; }
  .fund-block .fund-title { font-size: 13px; font-weight: 600; color: #0071e3; margin-bottom: 10px; }
  .remove-btn { position: absolute; top: 10px; right: 10px; background: none; border: none; color: #aeaeb2; font-size: 18px; cursor: pointer; }
  .remove-btn:hover { color: #ff3b30; }
  .add-btn { width: 100%; padding: 10px; border-radius: 10px; border: 1.5px dashed #d2d2d7; background: none; color: #0071e3; font-size: 14px; cursor: pointer; margin-top: 4px; }
  .add-btn:hover { background: #f0f6ff; }
  .calc-btn { width: 100%; padding: 13px; border-radius: 12px; border: none; background: #0071e3; color: #fff; font-size: 16px; font-weight: 500; cursor: pointer; margin-top: 4px; }
  .calc-btn:hover { background: #0077ed; }
  .results { display: none; }
  .results.show { display: block; }
  .metric-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin-bottom: 1rem; }
  .metric { background: #f0f6ff; border-radius: 12px; padding: 14px 12px; }
  .metric .m-label { font-size: 12px; color: #0071e3; margin-bottom: 5px; }
  .metric .m-val { font-size: 20px; font-weight: 600; color: #0071e3; }
  table { width: 100%; border-collapse: collapse; font-size: 14px; }
  th { text-align: left; padding: 8px 10px; font-size: 12px; color: #6e6e73; font-weight: 500; border-bottom: 1px solid #e5e5ea; }
  td { padding: 10px; border-bottom: 1px solid #f2f2f7; }
  tr:last-child td { border-bottom: none; }
  tr.best td { background: #fff8e6; font-weight: 600; }
  .medal { font-size: 16px; }
  .best-banner { background: linear-gradient(135deg, #ffd60a, #ff9f0a); border-radius: 12px; padding: 14px 18px; color: #3a2500; margin-top: 1rem; }
  .best-banner .bl { font-size: 13px; font-weight: 500; margin-bottom: 3px; }
  .best-banner .bv { font-size: 20px; font-weight: 700; }
  .warn { background: #fff3cd; border-radius: 10px; padding: 10px 14px; font-size: 13px; color: #856404; margin-top: 8px; display: none; }
  .tag { display: inline-block; font-size: 11px; padding: 2px 7px; border-radius: 6px; margin-left: 6px; font-weight: 500; }
  .tag-wb { background: #e8f4fd; color: #0071e3; }
  .tag-wr { background: #edfaf1; color: #1a8a3c; }
  select option.preset { font-weight: 500; }
  .preset-badge { font-size: 11px; color: #0071e3; margin-left: 4px; }
  @media (max-width: 500px) { .grid3, .metric-grid { grid-template-columns: 1fr 1fr; } th:nth-child(3), td:nth-child(3) { display: none; } }
</style>
</head>
<body>
<div class="container">
  <h1>富邦 VCCT 月配息計算器</h1>
  <p class="subtitle">富邦人壽真豐利變額年金保險｜多檔基金比較版</p>

  <!-- 基本設定 -->
  <div class="card">
    <h2>基本設定</h2>
    <div class="grid3">
      <div class="field">
        <label>保費（台幣）</label>
        <input type="number" id="premium" value="1000000">
      </div>
      <div class="field">
        <label>保費費用率（%）</label>
        <input type="number" id="feeRate" value="5" step="0.1">
      </div>
      <div class="field">
        <label>美金匯率</label>
        <input type="number" id="usdRate" value="31.4" step="0.1">
      </div>
    </div>
  </div>

  <!-- 基金輸入 -->
  <div class="card">
    <h2>基金資料</h2>
    <div id="funds-container"></div>
    <button class="add-btn" onclick="addFund()">＋ 新增基金</button>
    <div class="warn" id="warn"></div>
  </div>

  <button class="calc-btn" onclick="calculate()">計算並比較</button>

  <!-- 結果 -->
  <div class="results card" id="results" style="margin-top:1.25rem;">
    <h2>比較結果</h2>
    <div class="metric-grid" id="top-metrics"></div>
    <table>
      <thead>
        <tr>
          <th>排名</th>
          <th>基金名稱</th>
          <th>淨值</th>
          <th>分配金額</th>
          <th>月配息(TWD)</th>
          <th>年配息(TWD)</th>
          <th>報酬率</th>
        </tr>
      </thead>
      <tbody id="result-table"></tbody>
    </table>
    <div class="best-banner" id="best-banner"></div>
  </div>
</div>

<script>
// ── 您持有的 8 檔基金預設資料（最新數值）──
const PRESET_FUNDS = [
  { name: "JFP11", label: "JFP11｜摩根多重收益(美元對沖)",   nav: 74.7300, dist: 0.6930, type: "wb" },
  { name: "ACC3",  label: "ACC3｜安聯收益成長基金",           nav:  9.4100, dist: 0.0750, type: "wr" },
  { name: "IGB5",  label: "IGB5｜景順環球高評級企業債券",     nav:  6.9938, dist: 0.0510, type: "wb" },
  { name: "FRP4",  label: "FRP4｜富蘭克林穩定月收益",         nav:  9.8300, dist: 0.0670, type: "wb" },
  { name: "DSP5",  label: "DSP5｜安聯收益成長(美元)",         nav:  8.7391, dist: 0.0550, type: "wb" },
  { name: "SCP6",  label: "SCP6｜施羅德環球收益成長",         nav: 141.7219, dist: 1.1841, type: "wb" },
  { name: "ESC1",  label: "ESC1｜摩根多元入息成長",           nav:  8.3700, dist: 0.0687, type: "wr" },
  { name: "MLE24", label: "MLE24｜貝萊德世界科技基金",        nav: 20.9900, dist: 0.1375, type: "wb" },
];

let fundCount = 0;

function buildOptions() {
  let opts = '<option value="">── 自訂輸入 ──</option>';
  PRESET_FUNDS.forEach((f, i) => {
    const tag = f.type === 'wb' ? '海外' : '國內';
    opts += `<option value="${i}" class="preset">${f.label}（${tag}）</option>`;
  });
  return opts;
}

function addFund(presetIndex = null) {
  fundCount++;
  const div = document.createElement('div');
  div.className = 'fund-block';
  div.id = `fund-${fundCount}`;

  const preset = presetIndex !== null ? PRESET_FUNDS[presetIndex] : null;
  const selVal = presetIndex !== null ? presetIndex : '';
  const navVal = preset ? preset.nav : '';
  const distVal = preset ? preset.dist : '';
  const nameVal = preset ? preset.name : '';

  div.innerHTML = `
    <div class="fund-title">第 ${fundCount} 檔基金</div>
    <button class="remove-btn" onclick="removeFund(${fundCount})">✕</button>

    <div class="field" style="margin-bottom:10px;">
      <label>選擇基金（或自訂輸入）</label>
      <select id="sel-${fundCount}" onchange="onPresetChange(${fundCount})">
        ${buildOptions()}
      </select>
    </div>

    <div class="grid2" style="margin-bottom:8px;">
      <div class="field">
        <label>基金名稱</label>
        <input type="text" id="name-${fundCount}" placeholder="例：JFP11" value="${nameVal}">
      </div>
      <div class="field">
        <label>基金單位淨值（美金）</label>
        <input type="number" id="nav-${fundCount}" placeholder="例：74.73" step="0.0001" value="${navVal}">
      </div>
    </div>
    <div class="field">
      <label>每單位分配金額（美金）</label>
      <input type="number" id="dist-${fundCount}" placeholder="例：0.693" step="0.0001" value="${distVal}">
      <span class="hint">※ 數值來自富邦網站最新配息資料，可手動修改</span>
    </div>
  `;

  document.getElementById('funds-container').appendChild(div);

  if (presetIndex !== null) {
    document.getElementById(`sel-${fundCount}`).value = presetIndex;
  }
}

function onPresetChange(id) {
  const sel = document.getElementById(`sel-${id}`);
  const idx = sel.value;
  if (idx === '') return;
  const f = PRESET_FUNDS[parseInt(idx)];
  document.getElementById(`name-${id}`).value = f.name;
  document.getElementById(`nav-${id}`).value  = f.nav;
  document.getElementById(`dist-${id}`).value = f.dist;
}

function removeFund(id) {
  const el = document.getElementById(`fund-${id}`);
  if (el) el.remove();
}

function fmt(n, dec=0) {
  return n.toLocaleString('zh-TW', {minimumFractionDigits: dec, maximumFractionDigits: dec});
}

function calculate() {
  const premium = parseFloat(document.getElementById('premium').value) || 0;
  const feeRate = parseFloat(document.getElementById('feeRate').value) / 100 || 0;
  const usdRate = parseFloat(document.getElementById('usdRate').value) || 0;
  const warn    = document.getElementById('warn');
  const blocks  = document.querySelectorAll('.fund-block');

  if (blocks.length === 0) {
    warn.style.display = 'block';
    warn.textContent = '請先新增至少一檔基金。';
    return;
  }

  const results = [];
  for (const block of blocks) {
    const id   = block.id.split('-')[1];
    const name = document.getElementById(`name-${id}`).value || `基金${id}`;
    const nav  = parseFloat(document.getElementById(`nav-${id}`).value);
    const dist = parseFloat(document.getElementById(`dist-${id}`).value);
    if (!nav || !dist) {
      warn.style.display = 'block';
      warn.textContent = `「${name}」的淨值或分配金額未填寫，請檢查。`;
      return;
    }
    warn.style.display = 'none';

    const feeCost          = premium * feeRate;
    const effectivePremium = premium - feeCost;
    const usdInvested      = effectivePremium / usdRate;
    const units            = usdInvested / nav;
    const monthlyUsd       = units * dist;
    const monthlyTwd       = monthlyUsd * usdRate;
    const yearlyTwd        = monthlyTwd * 12;
    const yieldRate        = (yearlyTwd / effectivePremium) * 100;
    results.push({ name, nav, dist, monthlyTwd, yearlyTwd, yieldRate });
  }

  results.sort((a, b) => b.yieldRate - a.yieldRate);
  const medals = ['🥇', '🥈', '🥉'];
  const tbody = document.getElementById('result-table');
  tbody.innerHTML = '';

  results.forEach((r, i) => {
    const tr = document.createElement('tr');
    if (i === 0) tr.className = 'best';
    tr.innerHTML = `
      <td><span class="medal">${medals[i] || (i+1)+'.'}</span></td>
      <td>${r.name}</td>
      <td>${fmt(r.nav, 4)}</td>
      <td>${fmt(r.dist, 4)}</td>
      <td><strong>${fmt(Math.round(r.monthlyTwd))}</strong></td>
      <td>${fmt(Math.round(r.yearlyTwd))}</td>
      <td><strong>${r.yieldRate.toFixed(2)}%</strong></td>
    `;
    tbody.appendChild(tr);
  });

  const best  = results[0];
  const worst = results[results.length - 1];
  const diff  = Math.round(best.monthlyTwd - worst.monthlyTwd);

  document.getElementById('top-metrics').innerHTML = `
    <div class="metric">
      <div class="m-label">🏆 最高月配息</div>
      <div class="m-val">TWD ${fmt(Math.round(best.monthlyTwd))}</div>
    </div>
    <div class="metric">
      <div class="m-label">📈 最高年化報酬率</div>
      <div class="m-val">${best.yieldRate.toFixed(2)}%</div>
    </div>
    <div class="metric">
      <div class="m-label">💡 最高 vs 最低差距</div>
      <div class="m-val">TWD ${fmt(diff)}/月</div>
    </div>
  `;

  document.getElementById('best-banner').innerHTML = `
    <div class="bl">🏆 最佳選擇</div>
    <div class="bv">${best.name}</div>
    <div style="margin-top:4px; font-size:14px;">每月可領 TWD ${fmt(Math.round(best.monthlyTwd))}　年化報酬率 ${best.yieldRate.toFixed(2)}%</div>
  `;

  document.getElementById('results').classList.add('show');
  document.getElementById('results').scrollIntoView({ behavior: 'smooth' });
}

// 預設載入全部 8 檔基金
PRESET_FUNDS.forEach((_, i) => addFund(i));
</script>
</body>
</html>
